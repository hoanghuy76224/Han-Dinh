<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Thiên Định &amp; Gia Hân</title>
<style>
:root{--ink:#1a1a1a;--gold:#8a6b3b;--bg:#f7f4ef;--border:#d8cfc4;--ok:#2f7a3d;--err:#a03030}
*{box-sizing:border-box}
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:1.5rem;margin:0 0 4px;font-weight:600}
.sub{color:#666;font-size:.9rem;margin-bottom:24px}
.card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:20px}
label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:#444}
input[type=text],input[type=email],input[type=password],textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:.95rem;background:#fff}
input:focus,textarea:focus{outline:none;border-color:var(--gold)}
textarea{resize:vertical;min-height:180px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9rem}
.hint{font-size:.8rem;color:#777;margin-top:6px}
.btn{background:var(--ink);color:#fff;border:none;padding:10px 18px;border-radius:4px;font-size:.9rem;cursor:pointer;font-weight:500}
.btn:hover{background:var(--gold)}
.btn.secondary{background:transparent;color:var(--ink);border:1px solid var(--border)}
.btn.secondary:hover{background:#eee}
.btn[disabled]{opacity:.5;cursor:wait}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px}
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.85rem}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:top}
th{background:#f0ebe3;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#555}
td.link{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.75rem;color:#555;word-break:break-all;max-width:340px}
td.msg{max-width:260px;white-space:pre-wrap}
.copy-btn{background:transparent;border:1px solid var(--border);padding:5px 10px;border-radius:3px;font-size:.75rem;cursor:pointer;color:var(--ink);white-space:nowrap}
.copy-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
.copy-btn.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.empty{color:#999;text-align:center;padding:30px;font-style:italic}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{background:transparent;border:none;padding:10px 18px;font-size:.95rem;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500}
.tab.active{color:var(--ink);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px}
.stat .label{font-size:.75rem;color:#777;text-transform:uppercase;letter-spacing:.05em}
.stat .value{font-size:1.6rem;font-weight:600;margin-top:4px}
.stat.yes .value{color:var(--ok)}
.stat.no .value{color:var(--err)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.user-info{font-size:.85rem;color:#666}
.login-view{max-width:400px;margin:60px auto}
.err-msg{color:var(--err);font-size:.85rem;margin-top:8px;min-height:1.2em}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.75rem;font-weight:500}
.tag.yes{background:#d4edda;color:#155724}
.tag.no{background:#f8d7da;color:#721c24}
.tag.other{background:#e2e3e5;color:#383d41}
input+input{margin-top:10px}
@media(max-width:640px){body{padding:12px}td.link{font-size:.7rem;max-width:160px}}
</style>
</head>
<body>
<div class="wrap">

<div id="login-view" class="login-view">
  <div class="card">
    <h1>Đăng nhập admin</h1>
    <p class="sub">Dùng tài khoản Firebase Auth đã tạo trong console.</p>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required autocomplete="username">
      <input type="password" id="password" placeholder="Mật khẩu" required autocomplete="current-password">
      <div class="row"><button type="submit" class="btn" id="login-btn">Đăng nhập</button></div>
      <div class="err-msg" id="login-err"></div>
    </form>
  </div>
</div>

<div id="admin-view" style="display:none">
  <div class="top-bar">
    <div>
      <h1>Admin – Thiên Định &amp; Gia Hân</h1>
      <div class="user-info" id="user-info"></div>
    </div>
    <button class="btn secondary" id="logout-btn">Đăng xuất</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="rsvp">Danh sách RSVP</button>
    <button class="tab" data-tab="links">Tạo link mời</button>
  </div>

  <div class="tab-content active" id="tab-rsvp">
    <div class="stats">
      <div class="stat"><div class="label">Tổng phản hồi</div><div class="value" id="stat-total">0</div></div>
      <div class="stat yes"><div class="label">Sẽ đến</div><div class="value" id="stat-yes">0</div></div>
      <div class="stat no"><div class="label">Không đến</div><div class="value" id="stat-no">0</div></div>
      <div class="stat"><div class="label">Tổng khách dự kiến</div><div class="value" id="stat-guests">0</div></div>
    </div>
    <div class="card">
      <div class="row" style="margin:0 0 12px">
        <button class="btn" id="refresh-btn">Tải lại</button>
        <button class="btn secondary" id="export-btn">Xuất CSV</button>
        <span class="hint" id="last-updated"></span>
      </div>
      <div id="rsvp-results"><div class="empty">Đang tải...</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-links">
    <div class="card">
      <label for="baseUrl">Base URL của thiệp</label>
      <input type="text" id="baseUrl" placeholder="https://khunglongcon.com/thien-dinh-gia-han/">
      <div class="hint">Đường dẫn tới file index.html.</div>
    </div>
    <div class="card">
      <label for="guests">Danh sách khách (mỗi dòng 1 tên)</label>
      <textarea id="guests" placeholder="Anh Huy&#10;Chị Trinh&#10;Gia đình Bác Tám"></textarea>
      <div class="row">
        <button class="btn" id="genBtn">Tạo link</button>
        <button class="btn secondary" id="clearBtn">Xóa hết</button>
        <button class="btn secondary" id="copyAllBtn">Copy hết (dạng bảng)</button>
      </div>
      <div class="hint" id="link-count" style="margin-top:12px"></div>
    </div>
    <div class="card">
      <label>Kết quả</label>
      <div id="link-results"><div class="empty">Nhập danh sách và bấm Tạo link.</div></div>
    </div>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyCrVlD0T8Pcn51X_I8UWubne-A1pJjLvBg",
  authDomain: "vo-iu-dino.firebaseapp.com",
  projectId: "vo-iu-dino",
  storageBucket: "vo-iu-dino.firebasestorage.app",
  messagingSenderId: "626339714731",
  appId: "1:626339714731:web:bdc7abbf7cb633304bc9ee"
};
const RSVP_COLLECTION = "rsvps";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const $ = (id) => document.getElementById(id);

onAuthStateChanged(auth, (user) => {
  if (user) {
    $('login-view').style.display = 'none';
    $('admin-view').style.display = 'block';
    $('user-info').textContent = user.email;
    loadRsvps();
  } else {
    $('login-view').style.display = 'block';
    $('admin-view').style.display = 'none';
  }
});

$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = $('login-btn'), err = $('login-err');
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Đang đăng nhập...';
  try { await signInWithEmailAndPassword(auth, $('email').value, $('password').value); }
  catch (e) { err.textContent = 'Sai email hoặc mật khẩu.'; }
  finally { btn.disabled = false; btn.textContent = 'Đăng nhập'; }
});

$('logout-btn').addEventListener('click', () => signOut(auth));

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    $('tab-' + t.dataset.tab).classList.add('active');
  });
});

let rsvpData = [];

async function loadRsvps() {
  const box = $('rsvp-results');
  box.innerHTML = '<div class="empty">Đang tải...</div>';
  try {
    const q = query(collection(db, RSVP_COLLECTION), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    rsvpData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderRsvps();
    $('last-updated').textContent = 'Cập nhật: ' + new Date().toLocaleTimeString('vi-VN');
  } catch (e) {
    box.innerHTML = '<div class="empty" style="color:var(--err)">Lỗi tải dữ liệu: ' + escapeHtml(e.message) + '</div>';
  }
}

function renderRsvps() {
  const box = $('rsvp-results');
  if (!rsvpData.length) {
    box.innerHTML = '<div class="empty">Chưa có phản hồi nào.</div>';
    ['stat-total','stat-yes','stat-no','stat-guests'].forEach(id => $(id).textContent = 0);
    return;
  }
  let yes = 0, no = 0, totalGuests = 0;
  rsvpData.forEach(r => {
    const a = (r['Tham dự'] || '').toLowerCase();
    if (a.includes('có')) { yes++; totalGuests += parseInt(r['Số khách']) || 1; }
    else if (a.includes('không')) no++;
  });
  $('stat-total').textContent = rsvpData.length;
  $('stat-yes').textContent = yes;
  $('stat-no').textContent = no;
  $('stat-guests').textContent = totalGuests;

  let html = '<div style="overflow-x:auto"><table><thead><tr>' +
    '<th>#</th><th>Thời gian</th><th>Khách mời</th><th>Người phản hồi</th><th>SĐT</th>' +
    '<th>Tham dự</th><th>Số khách</th><th>Lời nhắn</th></tr></thead><tbody>';
  rsvpData.forEach((r, i) => {
    const a = r['Tham dự'] || '';
    let cls = 'other';
    if (a.toLowerCase().includes('có')) cls = 'yes';
    else if (a.toLowerCase().includes('không')) cls = 'no';
    const time = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleString('vi-VN') : '';
    html += `<tr>
      <td>${i+1}</td><td>${escapeHtml(time)}</td>
      <td>${escapeHtml(r['Khách được mời'] || '')}</td>
      <td>${escapeHtml(r['Họ và tên'] || '')}</td>
      <td>${escapeHtml(r['Số điện thoại'] || '')}</td>
      <td><span class="tag ${cls}">${escapeHtml(a)}</span></td>
      <td>${escapeHtml(r['Số khách'] || '')}</td>
      <td class="msg">${escapeHtml(r['Lời nhắn'] || '')}</td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  box.innerHTML = html;
}

$('refresh-btn').addEventListener('click', loadRsvps);

$('export-btn').addEventListener('click', () => {
  if (!rsvpData.length) { alert('Chưa có dữ liệu'); return; }
  const cols = ['Thời gian','Khách được mời','Họ và tên','Số điện thoại','Tham dự','Số khách','Lời nhắn'];
  const rows = [cols.join(',')];
  rsvpData.forEach(r => {
    const time = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleString('vi-VN') : '';
    rows.push([time, r['Khách được mời']||'', r['Họ và tên']||'', r['Số điện thoại']||'',
               r['Tham dự']||'', r['Số khách']||'', r['Lời nhắn']||''].map(csvCell).join(','));
  });
  const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rsvp-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
});

function csvCell(v) {
  const s = String(v).replace(/"/g, '""');
  return /[",\n]/.test(s) ? `"${s}"` : s;
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return String(s).replace(/"/g, '&quot;'); }

const KEY_URL = 'dh_base_url', KEY_GUESTS = 'dh_guests';
const autoBase = location.href.replace(/\?.*$/, '').replace(/#.*$/, '').replace(/\/(admin|index)(\.html)?\/?$/, '/');
$('baseUrl').value = localStorage.getItem(KEY_URL) || autoBase;
$('guests').value = localStorage.getItem(KEY_GUESTS) || '';
$('baseUrl').addEventListener('input', () => localStorage.setItem(KEY_URL, $('baseUrl').value));
$('guests').addEventListener('input', () => localStorage.setItem(KEY_GUESTS, $('guests').value));

function buildLink(base, name) {
  let b = (base || autoBase).trim();
  b = b.replace(/\/(admin|index)(\.html)?\/?$/, '/');
  if (!/\/$/.test(b) && !/\.[a-z]+$/i.test(b)) b += '/';
  return b + '?to=' + encodeURIComponent(name.trim());
}

function renderLinks() {
  const base = $('baseUrl').value;
  const names = $('guests').value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  const box = $('link-results');
  if (!names.length) { box.innerHTML = '<div class="empty">Chưa có khách nào.</div>'; $('link-count').textContent = ''; return; }
  let html = '<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Tên khách</th><th>Link mời</th><th></th></tr></thead><tbody>';
  names.forEach((name, i) => {
    const link = buildLink(base, name);
    html += `<tr><td>${i+1}</td><td>${escapeHtml(name)}</td><td class="link">${escapeHtml(link)}</td><td><button class="copy-btn" data-link="${escapeAttr(link)}">Copy</button></td></tr>`;
  });
  html += '</tbody></table></div>';
  box.innerHTML = html;
  $('link-count').textContent = `Tổng: ${names.length} khách`;
  box.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => copyText(btn.dataset.link, () => {
      btn.classList.add('ok'); btn.textContent = '✓ Đã copy';
      setTimeout(() => { btn.classList.remove('ok'); btn.textContent = 'Copy'; }, 1500);
    }));
  });
}

function copyText(text, cb) {
  if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(text).then(cb).catch(() => fallback(text, cb));
  else fallback(text, cb);
}
function fallback(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch (e) {}
  document.body.removeChild(ta);
}

$('genBtn').addEventListener('click', renderLinks);
$('clearBtn').addEventListener('click', () => {
  if (!confirm('Xóa hết?')) return;
  $('guests').value = ''; localStorage.setItem(KEY_GUESTS, ''); renderLinks();
});
$('copyAllBtn').addEventListener('click', () => {
  const base = $('baseUrl').value;
  const names = $('guests').value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  if (!names.length) { alert('Chưa có khách nào'); return; }
  const lines = ['Tên khách\tLink mời'];
  names.forEach(n => lines.push(`${n}\t${buildLink(base, n)}`));
  copyText(lines.join('\n'), () => alert('Đã copy ' + names.length + ' dòng'));
});

if ($('guests').value.trim()) renderLinks();
</script>
</body>
</html>
